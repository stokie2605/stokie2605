<svg width="1200" height="540" viewBox="0 0 1200 540" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Anonymized frontend UI concept studies</title>
  <desc id="desc">Four anonymized educational UI concept panels covering automotive diagnostics, outdoor response, product gallery, and community access interfaces.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="540" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020"/>
      <stop offset="0.54" stop-color="#101827"/>
      <stop offset="1" stop-color="#172033"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#3657F5"/>
      <stop offset="1" stop-color="#0E9FB7"/>
