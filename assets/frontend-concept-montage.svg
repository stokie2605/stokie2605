    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#FCD34D"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#12805C"/>
      <stop offset="1" stop-color="#38E2A1"/>
    </linearGradient>
    <linearGradient id="stone" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#D8C9AF"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#000000" flood-opacity="0.26"/>
    </filter>
  </defs>

  <rect width="1200" height="540" rx="30" fill="url(#bg)"/>
  <path d="M0 92H1200M0 184H1200M0 276H1200M0 368H1200M0 460H1200M110 0V540M220 0V540M330 0V540M440 0V540M550 0V540M660 0V540M770 0V540M880 0V540M990 0V540M1100 0V540" stroke="#FFFFFF" stroke-opacity="0.05"/>
  <circle cx="1035" cy="95" r="190" fill="#3657F5" fill-opacity="0.12"/>
  <circle cx="125" cy="475" r="170" fill="#38E2A1" fill-opacity="0.10"/>

  <text x="56" y="70" fill="#93C5FD" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" letter-spacing="4">EDUCATIONAL FRONTEND PRACTICE</text>
  <text x="56" y="124" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="900">Anonymized UI concept studies</text>
  <text x="58" y="164" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="19">Mobile-first layouts, semantic structure, accessibility basics, local SEO patterns, and fast static interfaces.</text>

