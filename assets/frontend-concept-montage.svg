    <text x="944" y="284" fill="#ECFEFF" font-family="Inter, Arial" font-size="12" font-weight="900" letter-spacing="2">COMMUNITY ACCESS</text>
    <text x="944" y="312" fill="#FFFFFF" font-family="Inter, Arial" font-size="22" font-weight="900">Accessible paths</text>
